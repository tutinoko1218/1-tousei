<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>掲示板</title>
</head>
<body>

<h1>掲示板</h1>

<!-- 投稿フォーム -->
<input id="name" placeholder="名前"><br><br>
<textarea id="text" placeholder="投稿"></textarea><br><br>
<button onclick="send()">投稿</button>

<!-- 投稿一覧表示 -->
<div id="posts"></div>

<!-- Firebase SDK (ES Modules) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js";

// --- Firebase 設定（コピー済み、重複なし） ---
const firebaseConfig = {
  apiKey: "AIzaSyBc6lKCrivuqFbSwAApwsWW9nuhwyqqrAE",
  authDomain: "tousei-a9858.firebaseapp.com",
  projectId: "tousei-a9858",
  storageBucket: "tousei-a9858.firebasestorage.app",
  messagingSenderId: "967253767952",
  appId: "1:967253767952:web:f4eeaed56aa2e737df9795",
  measurementId: "G-6MP9F75G8X"
};

// Firebase 初期化
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
const db = getFirestore(app);

// 投稿関数をグローバル化
window.send = async function() {
  const name = document.getElementById("name").value;
  const text = document.getElementById("text").value;
  if (!name || !text) {
    alert("名前と投稿を入力してください");
    return;
  }
  await addDoc(collection(db, "posts"), { name, text });
  document.getElementById("name").value = "";
  document.getElementById("text").value = "";
  alert("投稿しました");
  load();
};

// 投稿一覧を読み込む関数をグローバル化
window.load = async function() {
  const postsDiv = document.getElementById("posts");
  postsDiv.innerHTML = "";
  const querySnapshot = await getDocs(collection(db, "posts"));
  querySnapshot.forEach((doc) => {
    const data = doc.data();
    postsDiv.innerHTML += `<p><b>${data.name}</b> : ${data.text}</p>`;
  });
};

// ページ読み込み時に一覧表示
load();
</script>

</body>
</html>
