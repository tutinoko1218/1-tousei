<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>1等星</title>
  <style>
    body { background-color: navy; color: white; font-family: sans-serif; padding: 20px; }
    input, textarea, button { margin: 5px 0; padding: 5px; width: 300px; }
    button { cursor: pointer; }
    #posts { margin-top: 20px; }
    .post { margin-bottom: 10px; }
    .delete-btn { margin-left: 10px; background-color: red; color: white; border: none; padding: 2px 5px; }
  </style>
</head>
<body>

<h1>1等星</h1>

<input id="name" placeholder="名前"><br>
<textarea id="text" placeholder="投稿"></textarea><br>
<button id="postBtn">投稿</button>

<div id="posts"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// Firebase 設定
const firebaseConfig = {
  apiKey: "AIzaSyBc6lKCrivuqFbSwAApwsWW9nuhwyqqrAE",
  authDomain: "tousei-a9858.firebaseapp.com",
  projectId: "tousei-a9858",
  storageBucket: "tousei-a9858.appspot.com",
  messagingSenderId: "967253767952",
  appId: "1:967253767952:web:f4eeaed56aa2e737df9795",
  measurementId: "G-6MP9F75G8X"
};

// Firebase 初期化
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 投稿ボタン
document.getElementById("postBtn").addEventListener("click", send);

// 投稿関数
async function send() {
  const name = document.getElementById("name").value.trim();
  const text = document.getElementById("text").value.trim();
  if (!name || !text) {
    alert("名前と投稿を入力してください");
    return;
  }
  try {
    await addDoc(collection(db, "posts"), { name, text });
    document.getElementById("name").value = "";
    document.getElementById("text").value = "";
    load();
  } catch (e) {
    alert("投稿に失敗しました");
    console.error(e);
  }
}

// 削除関数
async function removePost(postId) {
  try {
    await deleteDoc(doc(db, "posts", postId));
    load();
  } catch (e) {
    alert("削除に失敗しました");
    console.error(e);
  }
}

// 投稿一覧表示
async function load() {
  const postsDiv = document.getElementById("posts");
  postsDiv.innerHTML = "";
  const querySnapshot = await getDocs(collection(db, "posts"));
  querySnapshot.forEach((docSnap) => {
    const data = docSnap.data();
    const id = docSnap.id;

    const postHTML = document.createElement("div");
    postHTML.className = "post";
    postHTML.textContent = `${data.name} : ${data.text}`;

    const btn = document.createElement("button");
    btn.className = "delete-btn";
    btn.textContent = "削除";
    btn.addEventListener("click", () => removePost(id));

    postHTML.appendChild(btn);
    postsDiv.appendChild(postHTML);
  });
}

// 初期表示
load();
</script>

</body>
</html>
