<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>1等星</title>
  <style>
    body { background-color: navy; color: white; font-family: sans-serif; }
    input, textarea, button { margin: 5px 0; }
    #posts { margin-top: 20px; }
  </style>
</head>
<body>

<h1>1等星</h1>

<input id="name" placeholder="名前"><br>
<textarea id="text" placeholder="投稿"></textarea><br>
<button onclick="send()">投稿</button>

<div id="posts"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// Firebase 設定
const firebaseConfig = {
  apiKey: "AIzaSyBc6lKCrivuqFbSwAApwsWW9nuhwyqqrAE",
  authDomain: "tousei-a9858.firebaseapp.com",
  projectId: "tousei-a9858",
  storageBucket: "tousei-a9858.appspot.com",
  messagingSenderId: "967253767952",
  appId: "1:967253767952:web:f4eeaed56aa2e737df9795",
  measurementId: "G-6MP9F75G8X"
};

// Firebase 初期化
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 投稿関数
async function send() {
  const name = document.getElementById("name").value.trim();
  const text = document.getElementById("text").value.trim();
  if (!name || !text) {
    alert("名前と投稿を入力してください");
    return;
  }
  try {
    await addDoc(collection(db, "posts"), { name, text });
    document.getElementById("name").value = "";
    document.getElementById("text").value = "";
    load();
  } catch (e) {
    alert("投稿に失敗しました");
    console.error(e);
  }
}

// 投稿一覧を読み込む
async function load() {
  const postsDiv = document.getElementById("posts");
  postsDiv.innerHTML = "";
  const querySnapshot = await getDocs(collection(db, "posts"));
  querySnapshot.forEach((doc) => {
    const data = doc.data();
    postsDiv.innerHTML += `<p><b>${data.name}</b> : ${data.text}</p>`;
  });
}

// ページ読み込み時に表示
load();
</script>

</body>
</html>
