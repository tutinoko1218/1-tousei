<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>1等星</title>
  <style>
    body { background-color: navy; color: white; font-family: sans-serif; padding: 20px; }
    input, textarea, button { margin: 5px 0; padding: 5px; width: 300px; }
    button { cursor: pointer; }
    #posts { margin-top: 20px; }
    .post { margin-bottom: 10px; }
    .delete-btn { margin-left: 10px; background-color: red; color: white; border: none; padding: 2px 5px; }
  </style>
</head>
<body>

<h1>1等星</h1>

<button id="loginBtn">Googleでログイン</button>
<button id="logoutBtn" style="display:none;">ログアウト</button>

<br><br>

<input id="name" placeholder="名前"><br>
<textarea id="text" placeholder="投稿"></textarea><br>
<button id="postBtn">投稿</button>

<div id="posts"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
  getFirestore, collection, addDoc, deleteDoc, doc, 
  onSnapshot, query, orderBy, serverTimestamp 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import { 
  getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// Firebase 設定
const firebaseConfig = {
  apiKey: "AIzaSyBc6lKCrivuqFbSwAApwsWW9nuhwyqqrAE",
  authDomain: "tousei-a9858.firebaseapp.com",
  projectId: "tousei-a9858",
  storageBucket: "tousei-a9858.appspot.com",
  messagingSenderId: "967253767952",
  appId: "1:967253767952:web:f4eeaed56aa2e737df9795",
  measurementId: "G-6MP9F75G8X"
};

// 初期化
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth();
const provider = new GoogleAuthProvider();

// ログイン
document.getElementById("loginBtn").onclick = () => {
  signInWithPopup(auth, provider);
};

// ログアウト
document.getElementById("logoutBtn").onclick = () => {
  signOut(auth);
};

// 投稿
document.getElementById("postBtn").onclick = send;

async function send() {
  const user = auth.currentUser;
  if (!user) {
    alert("ログインしてください");
    return;
  }

  const name = document.getElementById("name").value.trim();
  const text = document.getElementById("text").value.trim();

  if (!name || !text) {
    alert("名前と投稿を入力してください");
    return;
  }

  await addDoc(collection(db, "posts"), {
    uid: user.uid,
    name,
    text,
    createdAt: serverTimestamp()
  });

  document.getElementById("name").value = "";
  document.getElementById("text").value = "";
}

// 削除
async function removePost(id) {
  await deleteDoc(doc(db, "posts", id));
}

// リアルタイム表示
function load() {
  const postsDiv = document.getElementById("posts");
  const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));

  onSnapshot(q, (snapshot) => {
    postsDiv.innerHTML = "";
    snapshot.forEach((docSnap) => {
      const data = docSnap.data();
      const id = docSnap.id;

      const div = document.createElement("div");
      div.className = "post";
      div.textContent = `${data.name} : ${data.text}`;

      if (auth.currentUser && auth.currentUser.uid === data.uid) {
        const btn = document.createElement("button");
        btn.className = "delete-btn";
        btn.textContent = "削除";
        btn.onclick = () => removePost(id);
        div.appendChild(btn);
      }

      postsDiv.appendChild(div);
    });
  });
}

// ログイン状態監視
onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById("loginBtn").style.display = "none";
    document.getElementById("logoutBtn").style.display = "inline-block";
  } else {
    document.getElementById("loginBtn").style.display = "inline-block";
    document.getElementById("logoutBtn").style.display = "none";
  }
});

load();
</script>

</body>
</html>
